name: conclusion

on: 
  workflow_run:
    workflows: [firstTestWorkflow]
    types: 
      - completed

jobs: 
    job_1:
      runs-on: ubuntu-latest
      if: ${{ github.event.workflow_run.conclusion == 'success' }}
      steps:
        - run: |
            pwd 
            ls
    job_2:
      runs-on: ubuntu-latest
      if: ${{ github.event.workflow_run.conclusion == 'failure'}}
      steps: 
        - run: java --version