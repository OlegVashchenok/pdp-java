name: 4_workflow

on: 
  workflow_run:
    workflows: [firstTestWorkflow]
    types: 
      - completed

jobs: 
    step_1:
      runs-on: ubuntu-latest
      if: ${{ github.event.workflow_run.conclusion == 'success' }}
      steps:
        - run: |
            pwd 
            ls
    step_2:
      runs-on: ubuntu-latest
      if: ${{ github.event.workflow_run.conclusion == 'failure'}}
      steps: 
        - run: java --version