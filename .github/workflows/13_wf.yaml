name: status functions
on: push

jobs:
  # failure() success() always() cancelled()
  job:
    runs-on: ubuntu-latest
    steps:
      - name: Failure Step
        id: error-step
        run: exit 1

      - name: Runs on Canceled
        if: ${{ cancelled() }}
        run: echo "Runs on Canceled"

      - name: Runs on any case
        if: ${{ always() }}
        run: echo "Runs on any case"

      - name: Runs on Success
        if: ${{ success() }}
        run: echo "Runs on Success"

      - name: Runs on Failure
        if: ${{ failure() && steps.error-step.conclusion == 'failure' }}
        run: echo "Runs on Failure"

  second-job:
    runs-on: ubuntu-latest
    needs: job
    if: ${{ failure() }}
    steps:
      - run: echo "Job was failed"


        # ці функції можна використовувати для умовного виконання кроків або завдань на основі результатів попередніх
        # кроків або завдань. Вони допомагають контролювати потік виконання в залежності від успіху, невдачі,
        # скасування або будь-якого випадку.

        # failure(): Виконується, якщо попередній крок або завдання завершився з помилкою.
        # success(): Виконується, якщо попередній крок або завдання завершився успішно.

        # always(): Виконується незалежно від результату попереднього кроку або завдання.
        # це корисно для кроків, які повинні виконуватися завжди, наприклад, для очищення або звітності.

        # cancelled(): Виконується, якщо робота була скасована.
